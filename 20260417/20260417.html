<!DOCTYPE html>
<html>
<head>
<title>Web AR Example</title>
<script
src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-
org/AR.js/aframe/build/aframe-ar.js"></script>
</head><body>
<a-scene embedded arjs="sourceType: webcam;">
<a-marker preset="hiro">
<a-box position="0 0.5 0" rotation="0 45 0"
color="#ffffff"></a-box>
</a-marker>
<a-marker preset="kanji">
<!-- 在 Kanji 標記上放置一個球體（a-sphere） -->
<!-- position="0.5 0.5 0" 表示物件相對於標記的位置（右邊偏一點、高度 0.5） -->
<!-- radius="0.4" 設定球體半徑 -->
<!-- color="orange" 設定球體顏色為橘色 -->
<a-sphere position="0.5 0.5 0" radius="0.4" color="orange"></a-sphere>
</a-marker>
<a-entity camera></a-entity>
</a-scene>
</body>
</html>
